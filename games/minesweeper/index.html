<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Classic Minesweeper — Test your logic in this retro puzzle game. Flag all mines and clear the field!">
  <meta name="theme-color" content="#2d3436">
  <title>Minesweeper — Game Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../../index.html" id="back-btn" title="Back to Hub">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    <span>Hub</span>
  </a>

  <div id="game-container">
    <div id="minesweeper-window">
      <!-- Title Bar -->
      <div id="title-bar">
        <span>MINESWEEPER.EXE</span>
        <div class="difficulty-select">
          <select id="diff-dropdown">
            <option value="easy">Easy (9x9)</option>
            <option value="medium">Medium (16x16)</option>
            <option value="hard">Hard (30x16)</option>
          </select>
        </div>
      </div>

      <!-- Game Header -->
      <div id="game-header">
        <div class="counter" id="mine-counter">000</div>
        <button id="face-btn">😊</button>
        <div class="counter" id="timer">000</div>
      </div>

      <!-- The Grid -->
      <div id="grid-container">
        <div id="mine-grid"></div>
      </div>
    </div>

    <div id="status-bar">
      <span>SCORE: <span id="current-score">0</span></span>
      <span>BEST: <span id="high-score">0</span></span>
    </div>

    <div class="instructions">
      <p>Left Click: Open | Right Click: Flag</p>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
