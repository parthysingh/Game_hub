<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description"
    content="Asteroid Shooter — A classic space combat game. Destroy all asteroids and survive the deep space mission!">
  <meta name="theme-color" content="#D900FF">
  <title>Asteroid Shooter — Game Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <a href="../../index.html" id="back-btn" title="Back to Hub">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
    </svg>
    <span>Hub</span>
  </a>

  <div class="main-layout">
    <!-- INSTRUCTIONS PANEL -->
    <div class="instructions-panel">
      <h3>HOW TO PLAY</h3>
      <ul>
        <li><span class="key">⬆️/⬇️</span> <span class="action">THRUST</span></li>
        <li><span class="key">⬅️</span> <span class="action">LEFT</span></li>
        <li><span class="key">➡️</span> <span class="action">RIGHT</span></li>
        <li><span class="key">SPACE</span> <span class="action">SHOOT</span></li>
      </ul>
      <div class="mission">
        <p>MISSION:</p>
        <p>Destroy all asteroids.</p>
        <p>Don't crash.</p>
      </div>
    </div>

    <!-- GAME CONTAINER -->
    <div class="game-container">
      <div class="info-panel">
        <div id="score-container">SCORE: <span id="score">0</span></div>
        <div id="lives-container">LIVES: <span id="lives">3</span></div>
      </div>

      <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>

        <!-- START SCREEN -->
        <div id="start-screen">
          <h1>Asteroid<br />Shooter</h1>
          <p>Press Start to begin<br />your mission!</p>
          <button id="start-button" class="hub-btn">START MISSION</button>
        </div>

        <!-- GAME OVER MESSAGE BOX -->
        <div id="message-box" class="hidden">
          <h2 id="message-title">GAME OVER</h2>
          <p id="message-score">FINAL SCORE: 0</p>
          <p id="survival-tip"></p>
          <div class="msg-btns">
            <button id="restart-button" class="hub-btn">RESTART</button>
            <button id="survival-tip-button" class="hub-btn secondary">✨ GET SURVIVAL TIP</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/asteroid.js"></script>
  <script src="js/ship.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
