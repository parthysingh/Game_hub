<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Snake — A polished classic Snake game built with HTML5 Canvas, CSS & JavaScript. Play in your browser!">
  <meta name="theme-color" content="#00b894">
  <title>Snake — Game Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../../index.html" id="back-btn" title="Back to Hub">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    <span>Hub</span>
  </a>

  <div id="game-container">
    <div id="canvas-wrapper">
      <div class="score-overlay">
        <div class="score-mini">
          <span class="label">SCORE</span>
          <span id="current-score">000</span>
        </div>
        <div class="score-mini high-score">
          <span class="label">BEST</span>
          <span id="high-score">000</span>
        </div>
      </div>
      <canvas id="game-canvas"></canvas>
      
      <!-- Overlays -->
      <div id="overlay" class="overlay">
        <div id="start-screen" class="screen">
          <h1 class="game-title">SNAKE</h1>
          <p class="blink">Press SPACE or START</p>
          <button id="start-btn" class="primary-btn">START GAME</button>
        </div>

        <div id="pause-screen" class="screen" style="display:none;">
          <h1 class="game-title">PAUSED</h1>
          <button id="resume-btn" class="primary-btn">RESUME</button>
        </div>

        <div id="gameover-screen" class="screen" style="display:none;">
          <h1 class="game-title danger">GAME OVER</h1>
          <p id="final-score-msg">Final Score: 0</p>
          <button id="restart-btn" class="primary-btn">PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <!-- Mobile Controls -->
    <div id="controls-area">
      <div class="d-pad">
        <button id="btn-up" class="ctrl-btn up"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg></button>
        <button id="btn-left" class="ctrl-btn left"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg></button>
        <button id="btn-right" class="ctrl-btn right"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg></button>
        <button id="btn-down" class="ctrl-btn down"><svg viewBox="0 0 24 24" width="32" height="32"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg></button>
      </div>
      
      <div class="action-btns">
        <button id="pause-btn" class="action-btn" title="Pause Game">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="sound-btn" class="action-btn" title="Toggle Sound">
          <svg id="sound-on" viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          <svg id="sound-off" viewBox="0 0 24 24" width="24" height="24" fill="white" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/audio.js"></script>
  <script src="js/food.js"></script>
  <script src="js/snake.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
