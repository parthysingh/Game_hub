<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Ultimate Tic-Tac-Toe — A deep strategic version of the classic game. 9 boards in one!">
  <meta name="theme-color" content="#e17055">
  <title>Ultimate Tic-Tac-Toe — Game Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <a href="../../index.html" id="back-btn" title="Back to Hub">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    <span>Hub</span>
  </a>

  <div id="game-container">
    <div id="game-header">
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="ai">Vs AI</button>
        <button class="mode-btn" data-mode="pvp">PvP</button>
      </div>
      
      <div class="score-display">
        <div class="score-item player-x">
          <span class="label">PLAYER X</span>
          <span id="score-x">0</span>
        </div>
        <div class="score-item player-o">
          <span class="label">PLAYER O</span>
          <span id="score-o">0</span>
        </div>
      </div>
    </div>

    <div id="ultimate-board">
      <!-- 9 Small Boards will be generated via JS or defined here -->
      <!-- Defining them here for better CSS control -->
      <div class="small-board" data-board="0"></div>
      <div class="small-board" data-board="1"></div>
      <div class="small-board" data-board="2"></div>
      <div class="small-board" data-board="3"></div>
      <div class="small-board" data-board="4"></div>
      <div class="small-board" data-board="5"></div>
      <div class="small-board" data-board="6"></div>
      <div class="small-board" data-board="7"></div>
      <div class="small-board" data-board="8"></div>
    </div>

    <div id="game-info">
      <div id="turn-indicator">X's Turn</div>
      <div id="move-status">Play anywhere</div>
    </div>

    <button id="restart-btn" class="secondary-btn">Restart Game</button>

    <!-- Game End Overlay -->
    <div id="overlay" class="hidden">
      <div id="status-msg">X WINS THE GAME!</div>
      <button id="play-again-btn" class="primary-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
